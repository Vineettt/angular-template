<mat-toolbar color="primary">
  <mat-toolbar-row>
    <span> AW
    </span>
    <span class="example-spacer"></span>
    <button mat-icon-button class="example-icon" [matMenuTriggerFor]="menu">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      @for (item of __itemsList; track item) {
      <app-button  [id]="item.id"  [element]="item.element" [type]="item.type" [label]="item.label" [icon]="item.icon"
      [color]="item.color" (onClick)="buttonOnClick($event)"></app-button>
      }
    </mat-menu>
  </mat-toolbar-row>
</mat-toolbar>
