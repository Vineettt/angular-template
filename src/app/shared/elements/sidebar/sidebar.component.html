<mat-drawer-container autosize>
    
    <mat-drawer #drawer opened="true" mode="side" position="start">
        <div class="profile" style="height: 100px;">
        </div>
    <mat-nav-list>
        <mat-list-item *ngFor="let item of sidebarItems" class="my-2">
            <a matLine [routerLink]="[item.route]" class="d-flex align-items-center">
              <mat-icon class="m-2">{{ item.icon }}</mat-icon>
              {{ item.label }}
            </a>
          </mat-list-item>
    </mat-nav-list>
    </mat-drawer>
    <mat-drawer-content>
        <div class="siebarHt">
            </div>
    </mat-drawer-content>
</mat-drawer-container>
