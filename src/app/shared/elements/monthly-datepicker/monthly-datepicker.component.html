<mat-form-field [appearance]="__appearance">
    <mat-label>{{__label}}</mat-label>
    <input matInput [matDatepicker]="dp" [formControl]="__date">
    <mat-datepicker-toggle matIconSuffix [for]="dp"></mat-datepicker-toggle>
    <mat-datepicker #dp
                    startView="multi-year"
                    (monthSelected)="setMonthAndYear($event, dp)"
                    panelClass="example-month-picker">
    </mat-datepicker>
  </mat-form-field>
