<div *ngIf="isTableStructureReady() === false">
    Table Loading Error
</div>

<div class="table-container" *ngIf="isTableStructureReady() === true">
    <table mat-table [dataSource]="__dataSource" matSort>
        <ng-container *ngFor="let col of __columnData" [matColumnDef]="col.prop">
            <th mat-header-cell *matHeaderCellDef>
                {{col.displayName}}
            </th>
            <td mat-cell *matCellDef="let element" [attr.data-label]="col">
                <ng-container>
                    <span *ngIf="!col.editOption">{{element[col.prop]}}</span>
                    <app-button *ngIf="col.editOption === 'button'" [icon]="col.icon"></app-button>
                </ng-container>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="__displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: __displayedColumns;"></tr>
    </table>
    <div class="noDataFound" *ngIf="__dataSourceLength===0">No Record Found</div>
    <div class="noDataFound" *ngIf="__dataSourceLength===-1"> <span class="action-box">
            <mat-label>Loading</mat-label>
        </span></div>
    <mat-paginator [length]="__dataSourceLength" [pageSizeOptions]="__pageSizeOptions" [pageIndex]="__dataSourceIndex"
        [pageSize]="__dataSourcePageSize" (page)="onPaginateChange($event)" showFirstLastButtons>
    </mat-paginator>
</div>
