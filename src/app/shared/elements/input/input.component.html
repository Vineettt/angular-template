<mat-form-field [appearance]="__appearance">
    <mat-label>{{__label}}</mat-label>
    <input matInput type="{{__type}}" [(ngModel)]="__value" [required]="__required" [disabled]="__disabled" [min]="__min" [max]="__max" [pattern]="__pattern" [maxlength]="__maxlength" [minlength]="__minlength" (ngModelChange)="onValueChange($event)">
    <mat-icon class="cursor" *ngIf="__icon" matSuffix (click)="iconClick($event)">{{__icon}}</mat-icon>
</mat-form-field>
